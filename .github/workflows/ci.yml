name: CI Pipeline - Integration, Dependency Check, UI Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ---------- Integration: build and start the app stack ----------
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start webapp + database
        run: docker compose up -d --build webapp mysqldb

      - name: Wait for webapp to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost/ > /dev/null; then
              echo "webapp is up after $((i*5)) seconds"
              exit 0
            fi
            echo "waiting for webapp... ($i/60)"
            sleep 5
          done
          echo "webapp did not become ready in time"
          exit 1

      - name: Verify home page responds
        run: curl --fail http://localhost/

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "===== container status ====="
          docker compose ps
          echo "===== webapp logs ====="
          docker compose logs webapp
          echo "===== mysqldb logs ====="
          docker compose logs mysqldb

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------- Dependency Check: scan for vulnerable dependencies ----------
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ssd-webapp'
          path: './webapp'
          format: 'HTML'
          out: 'dependency-check-report'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report

  # ---------- UI Test: Selenium test over HTTP against the running app ----------
  ui-test:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start webapp + database
        run: docker compose up -d --build webapp mysqldb

      - name: Start Selenium standalone Chrome
        run: docker run -d --name selenium-server --network host selenium/standalone-chrome

      - name: Wait for webapp to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost/ > /dev/null; then
              echo "webapp is up"
              exit 0
            fi
            echo "waiting for webapp... ($i/60)"
            sleep 5
          done
          exit 1

      - name: Wait for Selenium to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4444/wd/hub/status > /dev/null; then
              echo "selenium is up"
              exit 0
            fi
            echo "waiting for selenium... ($i/30)"
            sleep 3
          done
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Selenium client
        run: npm install selenium-webdriver

      - name: Run UI tests over HTTP
        run: node tests/selenium-test.mjs

      - name: Show logs on failure
        if: failure()
        run: |
          echo "===== container status ====="
          docker compose ps
          echo "===== webapp logs ====="
          docker compose logs webapp
          echo "===== selenium logs ====="
          docker logs selenium-server || true

      - name: Tear down
        if: always()
        run: |
          docker rm -f selenium-server || true
          docker compose down -v
